<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>예매 확인</title>
<style>
  :root {
    --bg: #f5f4ef;
    --surface: #ffffff;
    --text: #1a1a18;
    --muted: #6b6a64;
    --border: #e3e1d9;
    --success-bg: #e1f5ee; --success-tx: #0f6e56; --success-bd: #9fe1cb;
    --warning-bg: #faeeda; --warning-tx: #854f0b; --warning-bd: #fac775;
    --info-bg: #e6f1fb; --info-tx: #185fa5; --info-bd: #b5d4f4;
    --accent: #1a1a18;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .wrap {
    width: 100%;
    max-width: 420px;
    background: var(--bg);
    border-radius: 16px;
    padding: 28px 24px;
  }
  .head { text-align: center; margin-bottom: 24px; }
  .head h1 { font-size: 24px; font-weight: 600; margin: 0; }
  .head p { font-size: 14px; color: var(--muted); margin: 6px 0 0; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    height: 44px;
    padding: 0 12px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
    margin-bottom: 14px;
    outline: none;
  }
  input:focus { border-color: #999; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  button {
    width: 100%;
    height: 46px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 2px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .result { margin-top: 20px; }
  .alert {
    border-radius: 14px;
    padding: 18px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .alert .icon { font-size: 22px; line-height: 1; margin-top: 2px; }
  .alert .title { font-size: 16px; font-weight: 600; }
  .alert .body { font-size: 14px; color: var(--text); margin-top: 4px; line-height: 1.5; }
  .footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 20px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>예매 확인</h1>
      <p>이름과 전화번호를 입력해 입금 상태를 확인하세요</p>
    </div>
    <div class="card">
      <label for="nm">이름</label>
      <input id="nm" type="text" placeholder="홍길동" autocomplete="off" />
      <label for="ph">전화번호</label>
      <input id="ph" type="tel" placeholder="010-1234-5678" autocomplete="off" />
      <button id="btn">조회하기</button>
    </div>
    <div class="result" id="result"></div>
    <div class="footer">입력하신 정보는 조회에만 사용되며 저장되지 않습니다.</div>
  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyV6dxdIlsWfyog2pxTd1KQNnkzH6Za4v50-sWPKSb7DAQe3dbzqbsrt_1Ac7KKLdrWnQ/exec";
const el = document.getElementById("result");
const btn = document.getElementById("btn");

function render(html){ el.innerHTML = html; }
function alertBox(type, icon, title, body){
  return '<div class="alert" style="background:var(--'+type+'-bg); border:1px solid var(--'+type+'-bd);">'
    + '<div class="icon" style="color:var(--'+type+'-tx);">'+icon+'</div>'
    + '<div><div class="title" style="color:var(--'+type+'-tx);">'+title+'</div>'
    + (body ? '<div class="body">'+body+'</div>' : '')
    + '</div></div>';
}

async function lookup(){
  const name = (document.getElementById("nm").value || "").trim();
  const phone = (document.getElementById("ph").value || "").trim();
  if(!name || !phone){
    render(alertBox("info","ℹ","이름과 전화번호를 모두 입력해주세요.",""));
    return;
  }
  render(alertBox("info","⏳","조회 중...",""));
  btn.disabled = true;
  try {
    const url = API + "?name=" + encodeURIComponent(name) + "&phone=" + encodeURIComponent(phone);
    const res = await fetch(url);
    const data = await res.json();
    if(data.status === "found"){
      if(data.paid){
        render(alertBox("success","✓","예매 완료","<b>"+data.name+"</b>님 ("+data.ticket+") · 입금이 확인되었습니다."));
      } else {
        render(alertBox("warning","⏱","입금 확인 대기중","<b>"+data.name+"</b>님 ("+data.ticket+") · 아직 입금이 확인되지 않았습니다."));
      }
    } else if(data.status === "notfound"){
      render(alertBox("warning","!","예매 내역을 찾을 수 없어요","입력하신 이름과 전화번호가 명단과 일치하지 않습니다. 다시 확인해주세요."));
    } else {
      render(alertBox("warning","!","오류", data.msg || "잠시 후 다시 시도해주세요."));
    }
  } catch(err) {
    render(alertBox("warning","!","연결 오류","서버에 연결하지 못했습니다. 잠시 후 다시 시도해주세요."));
  } finally {
    btn.disabled = false;
  }
}

btn.addEventListener("click", lookup);
["nm","ph"].forEach(id => document.getElementById(id).addEventListener("keydown", e => { if(e.key==="Enter") lookup(); }));
</script>
</body>
</html>
